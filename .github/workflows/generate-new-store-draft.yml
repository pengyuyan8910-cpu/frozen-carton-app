name: 新增门店严格排柜草稿
on:
  push:
    paths:
      - 'data/new-store/*.xlsx'
      - 'data/new-store/*.json'
      - 'scripts/generate-new-store-draft.mjs'
      - 'scripts/source-to-app-data.mjs'
      - 'scripts/app-data-to-workbook.mjs'
      - 'package.json'
      - '.github/workflows/generate-new-store-draft.yml'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: frozen-carton-new-store-draft
  cancel-in-progress: true
jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: 识别本次上传的门店配置
        id: config
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            file=$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" -- 'data/new-store/*.xlsx' 'data/new-store/*.json' | grep -v -E 'README|模板' | head -n 1 || true)
            if [ -z "$file" ]; then
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            file='data/new-store/新增门店配置.xlsx'
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "path=$file" >> "$GITHUB_OUTPUT"
      - name: 生成严格排柜草稿
        if: steps.config.outputs.run == 'true'
        env:
          NEW_STORE_CONFIG_PATH: ${{ steps.config.outputs.path }}
        run: node scripts/generate-new-store-draft.mjs
      - name: 提交草稿结果
        if: steps.config.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/drafts
          if git diff --cached --quiet; then
            echo "新增门店草稿没有变化"
          else
            git commit -m "chore: 自动生成新增门店严格排柜草稿"
            git push
          fi